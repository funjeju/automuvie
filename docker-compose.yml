services:
  backend:
    build: ./src/backend
    container_name: automuvie-backend
    ports:
      - "8000:8000"
    environment:
      ENV: development
      API_BASE_URL: http://localhost:8000
      CORS_ORIGINS: http://localhost:3000
      LYRICS_PROVIDER: mock
      MUSIC_PROVIDER: mock
      IMAGE_PROVIDER: mock
      VIDEO_PROVIDER: mock
      SUBTITLE_PROVIDER: mock
      TEMP_DIR: /data/temp
      OUTPUT_DIR: /data/output
      FIREBASE_PROJECT_ID: automuvie-ccee1
      FIREBASE_STORAGE_BUCKET: automuvie-ccee1.firebasestorage.app
      GOOGLE_APPLICATION_CREDENTIALS: /run/secrets/firebase-admin.json
    volumes:
      - ./output:/data/output
      - ./temp:/data/temp
      # 호스트의 service account JSON을 read-only로 mount (이미지에는 포함되지 않음)
      - ./src/backend/serviceAccountKey.json:/run/secrets/firebase-admin.json:ro
    restart: unless-stopped

  frontend:
    build: ./src/frontend
    container_name: automuvie-frontend
    ports:
      - "3000:3000"
    # NEXT_PUBLIC_FIREBASE_* 값은 호스트 env 또는 src/frontend/.env.local에서 주입.
    # docker-compose 파일에 하드코딩하지 않는다 (GitHub Secret Scanning 회피).
    env_file:
      - ./src/frontend/.env.local
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
      NEXT_PUBLIC_DEV_UID: dev_user
    depends_on:
      - backend
    restart: unless-stopped
